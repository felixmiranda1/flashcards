{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Flashcards{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'cards/styles.css' %}">
  <script src="{% static 'cards/htmx.min.js' %}" defer></script>
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block header %}
    <header class="topbar">
      <a class="brand" href="{% url 'cards:dashboard' %}">Flashcards</a>
      <nav class="nav">
        <a href="{% url 'cards:study' %}">Estudar</a>
        <a href="{% url 'cards:category_list' %}">Categorias</a>
        <a href="{% url 'cards:flashcard_create' %}">Novo card</a>
      </nav>
    </header>
  {% endblock %}

  <main class="{% block main_class %}page{% endblock %}">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <p class="message {{ message.tags }}">{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
